# alembic 主配置。
# 多 head 设计：每个业务模块（channel_pack / user / content / admin）一个独立 version 目录，
# 各自维护 revision 链；env.py 在 autogenerate 时合并所有 Base.metadata。

[alembic]
script_location = alembic

# 多 version 目录（multi-head）
version_locations = %(here)s/alembic/versions/channel_pack %(here)s/alembic/versions/user %(here)s/alembic/versions/content %(here)s/alembic/versions/admin

# revision 文件命名：时间戳前缀，可读性高
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# DB URL 由 env.py 从 app.core.config 读，留空避免误用
sqlalchemy.url =

# python -m alembic 工作目录
prepend_sys_path = .

# tz-aware（migration ts 用 UTC）
timezone = UTC

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
