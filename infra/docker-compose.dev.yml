# 本地开发编排。
#
# 用法（在仓库根目录）：
#   docker compose -f infra/docker-compose.dev.yml up -d
#
# 服务：
#   backend  — FastAPI（先以 SQLite 跑，volume 挂存 dev.db / storage）
#   redis    — 给 P3 黑名单 / P5 限流 用，MVP 进程内字典也行，预启动方便联调
#
# 注意：
#   - MySQL 走 RDS（不本地起），P0 阶段用户开通后切 DATABASE_URL=mysql+pymysql://...
#   - 生产部署走另一份 infra/docker-compose.yml（P2.40 待写）

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: movie-backend:dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./storage/dev.db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-please-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5174}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - backend_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    # P6.5：dev 关 AOF（数据可丢；prod 配置另议）
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  backend_storage:
