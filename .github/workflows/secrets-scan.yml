name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 同分支多次 push 取消旧 run
concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks 全 history 扫描
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 拿全 history 才能扫到老 commit；fetch-depth=0
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 默认会用仓库根目录的 .gitleaks.toml（如果存在）；否则用内置规则集
