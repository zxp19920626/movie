name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同分支多次 push 时取消旧 run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend / lint + typecheck + test + import-linter
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies (incl. dev)
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check app alembic

      - name: Ruff format check
        run: uv run ruff format --check app alembic

      - name: Mypy
        run: uv run mypy app
        continue-on-error: true   # 渐进开严：先不阻断，后续移除此行

      - name: Import boundaries (import-linter)
        run: uv run lint-imports

      - name: Pytest
        run: |
          if [ -d tests ]; then
            uv run pytest -q
          else
            echo "no tests/ dir yet — skip"
          fi

  admin-web:
    name: admin-web / typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: admin-web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: admin-web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (vue-tsc + vite build)
        run: pnpm build
